name: MaimaiStabilizer

options:
  bundleIdPrefix: com.maimai
  deploymentTarget: {iOS: "17.0"}
  xcodeVersion: "16.2"
  developmentLanguage: zh-Hans

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"

targets:
  MaimaiStabilizer:
    type: application
    platform: iOS
    sources:
      - path: MaimaiStabilizerApp.swift
      - path: Services
      - path: Views
      - path: Resources
      - path: Info.plist
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.maimai.stabilizer
        PRODUCT_NAME: "MaimaiStabilizer"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        ENABLE_PREVIEWS: "NO"
        INFOPLIST_KEY_NSCameraUsageDescription: "采集视频进行地平线稳定"
        INFOPLIST_KEY_NSMotionUsageDescription: "采集陀螺仪数据进行画面反旋转"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "录制视频需要采集音频"
